<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MODMATRIX</title>

<style>

body{
margin:0;
font-family:Orbitron, Arial;
background:#05070d;
color:white;
}

/* HEADER */

header{
background:#0a0f1a;
padding:25px;
text-align:center;
border-bottom:1px solid #00ffa6;
}

header h1{
color:#00ffa6;
letter-spacing:3px;
}

/* NAV */

nav{
background:#090d16;
padding:12px;
text-align:center;
}

nav a{
color:#00ffa6;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
text-shadow:0 0 10px #00ffa6;
}

/* MAIN */

main{
max-width:1200px;
margin:auto;
padding:30px;
}

/* SEARCH */

.search{
text-align:center;
margin-bottom:30px;
}

.search input{
padding:10px;
width:260px;
border:none;
background:#0c1322;
color:white;
border-radius:5px;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#0b1322;
border-radius:10px;
padding:20px;
box-shadow:0 0 20px #00ffa620;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 20px #00ffa6;
}

.card img{
width:100%;
border-radius:6px;
}

.price{
color:#00ffa6;
font-size:22px;
margin:10px 0;
}

/* BUTTON */

button{
background:#00ffa6;
border:none;
padding:10px 16px;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#00cc84;
}

/* CART */

.cart{
margin-top:40px;
background:#0b1322;
padding:20px;
border-radius:10px;
box-shadow:0 0 20px #00ffa620;
}

/* FOOTER */

footer{
margin-top:60px;
background:#0a0f1a;
padding:20px;
text-align:center;
border-top:1px solid #00ffa6;
}

</style>
</head>

<body>

<header>
<h1>MODMATRIX</h1>
<p>Cyber Marketplace</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Store</a>
<a href="#">Support</a>
</nav>

<main>

<div class="search">
<input id="search" placeholder="Search products..." onkeyup="searchProducts()">
</div>

<h2>Products</h2>

<div class="products">

<div class="card product">
<img src="https://via.placeholder.com/300x180">
<h3>Starter License</h3>
<p>Basic features</p>
<div class="price">£9.99</div>
<button onclick="addToCart('Starter License',9.99)">Add to Cart</button>
</div>

<div class="card product">
<img src="https://via.placeholder.com/300x180">
<h3>Premium License</h3>
<p>Full access</p>
<div class="price">£19.99</div>
<button onclick="addToCart('Premium License',19.99)">Add to Cart</button>
</div>

<div class="card product">
<img src="https://via.placeholder.com/300x180">
<h3>Elite License</h3>
<p>Everything unlocked</p>
<div class="price">£39.99</div>
<button onclick="addToCart('Elite License',39.99)">Add to Cart</button>
</div>

</div>

<div class="cart">

<h2>Cart</h2>

<ul id="cart-items"></ul>

<p>Total: £<span id="cart-total">0</span></p>

<button onclick="checkout()">Checkout</button>

</div>

</main>

<footer>
© 2026 MODMATRIX
</footer>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name,price){

cart.push({name,price});

localStorage.setItem("cart",JSON.stringify(cart));

updateCart();

}

function removeItem(index){

cart.splice(index,1);

localStorage.setItem("cart",JSON.stringify(cart));

updateCart();

}

function updateCart(){

let cartList=document.getElementById("cart-items");
let totalElement=document.getElementById("cart-total");

cartList.innerHTML="";

let total=0;

cart.forEach((item,index)=>{

total+=item.price;

let li=document.createElement("li");

li.innerHTML=item.name+" - £"+item.price+
" <button onclick='removeItem("+index+")'>X</button>";

cartList.appendChild(li);

});

totalElement.innerText=total.toFixed(2);

}

function searchProducts(){

let input=document.getElementById("search").value.toLowerCase();

let cards=document.querySelectorAll(".product");

cards.forEach(card=>{

let title=card.querySelector("h3").innerText.toLowerCase();

if(title.includes(input)){

card.style.display="block";

}else{

card.style.display="none";

}

});

}

function checkout(){

alert("Redirect to payment system.");

}

updateCart();

</script>

</body>
</html>
