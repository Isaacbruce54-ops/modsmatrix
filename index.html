<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MODMATRIX</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f1115;
color:white;
}

header{
background:#151821;
padding:20px;
text-align:center;
}

nav{
background:#1e2430;
padding:12px;
text-align:center;
}

nav a{
color:white;
margin:0 12px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#00ffa6;
}

main{
padding:30px;
max-width:1100px;
margin:auto;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1a1f2b;
padding:20px;
border-radius:10px;
}

.card img{
width:100%;
border-radius:6px;
}

.price{
color:#00ffa6;
font-size:20px;
margin:10px 0;
}

button{
padding:10px 16px;
background:#00ffa6;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#00cc84;
}

.cart{
background:#151821;
padding:20px;
border-radius:10px;
margin-top:40px;
}

footer{
background:#151821;
text-align:center;
padding:15px;
margin-top:40px;
}

</style>
</head>

<body>

<header>
<h1>MODMATRIX</h1>
<p>Premium Digital Licenses</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Store</a>
<a href="#">Support</a>
</nav>

<main>

<h2>Featured Products</h2>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/300x180">
<h3>Starter License</h3>
<p>Basic access license</p>
<div class="price">£9.99</div>
<button onclick="addToCart('Starter License',9.99)">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x180">
<h3>Premium License</h3>
<p>Full features unlocked</p>
<div class="price">£19.99</div>
<button onclick="addToCart('Premium License',19.99)">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x180">
<h3>Elite License</h3>
<p>All features + updates</p>
<div class="price">£39.99</div>
<button onclick="addToCart('Elite License',39.99)">Add to Cart</button>
</div>

</div>

<div class="cart">

<h2>Your Cart</h2>

<ul id="cart-items"></ul>

<p>Total: £<span id="cart-total">0</span></p>

<button onclick="checkout()">Checkout</button>

</div>

</main>

<footer>
<p>© 2026 MODMATRIX</p>
</footer>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name,price){

cart.push({name,price});

saveCart();
updateCart();

}

function removeItem(index){

cart.splice(index,1);

saveCart();
updateCart();

}

function saveCart(){

localStorage.setItem("cart",JSON.stringify(cart));

}

function updateCart(){

let cartList = document.getElementById("cart-items");
let totalElement = document.getElementById("cart-total");

cartList.innerHTML="";

let total=0;

cart.forEach((item,index)=>{

total+=item.price;

let li=document.createElement("li");

li.innerHTML=item.name+" - £"+item.price+
" <button onclick='removeItem("+index+")'>Remove</button>";

cartList.appendChild(li);

});

totalElement.innerText=total.toFixed(2);

}

function checkout(){

alert("Proceed to payment system.");

}

updateCart();

</script>

</body>
</html>
